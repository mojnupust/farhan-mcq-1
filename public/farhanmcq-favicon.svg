<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark navy background matching logo: #131B2E -->
  <rect width="32" height="32" rx="7.5" fill="#131B2E"/>

  <!-- Bold "F" — thick rounded strokes matching the logo style -->
  <!-- Vertical stem -->
  <rect x="6.5" y="6" width="5" height="20" rx="2.5" fill="#F9FAFC"/>
  <!-- Top horizontal bar -->
  <rect x="6.5" y="6" width="16" height="5" rx="2.5" fill="#F9FAFC"/>
  <!-- Middle horizontal bar (shorter) -->
  <rect x="6.5" y="14" width="12" height="4.5" rx="2.2" fill="#F9FAFC"/>

  <!-- Amber checkmark — matching logo #F49E0B -->
  <!-- Left stroke of checkmark -->
  <line x1="17" y1="25" x2="20.5" y2="29" stroke="#F49E0B" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right stroke of checkmark (longer) -->
  <line x1="20.5" y1="29" x2="27.5" y2="20" stroke="#F49E0B" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
